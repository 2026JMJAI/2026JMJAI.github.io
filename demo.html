﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI每日简报 - 2026年5月10日</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #60a5fa 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 70px rgba(30, 58, 138, 0.35);
            max-width: 650px;
            width: 100%;
            padding: 0;
            overflow: hidden;
        }
        .weather-section {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            padding: 28px 32px;
            color: white;
        }
        .weather-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .weather-location {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .weather-date {
            font-size: 15px;
            opacity: 0.95;
            font-weight: 500;
        }
        .weather-weekday {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 2px;
        }
        .weather-icon {
            font-size: 48px;
        }
        .weather-main {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .weather-temp {
            font-size: 42px;
            font-weight: 700;
        }
        .weather-info {
            flex: 1;
        }
        .weather-condition {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .weather-wind {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .weather-tip {
            font-size: 13px;
            opacity: 0.9;
            background: rgba(255,255,255,0.15);
            padding: 8px 12px;
            border-radius: 8px;
            display: inline-block;
        }
        .weather-source {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 12px;
            text-align: right;
        }
        .content-section {
            padding: 32px;
        }
        h1 {
            color: #1e3a8a;
            font-size: 22px;
            margin-bottom: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h1::before {
            content: '';
            width: 4px;
            height: 24px;
            background: #2563eb;
            border-radius: 2px;
        }
        .section-block {
            margin-bottom: 28px;
            background: #f0f9ff;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #bae6fd;
        }
        .section-block:last-child {
            margin-bottom: 0;
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 2px solid #38bdf8;
        }
        .section-icon {
            font-size: 20px;
        }
        .section-count {
            margin-left: auto;
            font-size: 12px;
            color: #64748b;
            background: #e0f2fe;
            padding: 4px 10px;
            border-radius: 10px;
        }
        .section-title {
            font-weight: 700;
            color: #0c4a6e;
            font-size: 17px;
        }
        .news-item {
            background: white;
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 16px;
            border: 1px solid #e0f2fe;
            transition: all 0.2s ease;
        }
        .news-item:last-child {
            margin-bottom: 0;
        }
        .news-item:hover {
            border-color: #7dd3fc;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.15);
        }
        .news-date {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 8px;
            font-weight: 400;
        }
        .news-title {
            font-weight: 600;
            color: #0f172a;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        .news-summary {
            font-size: 14px;
            color: #475569;
            line-height: 1.6;
            margin-bottom: 12px;
            padding: 10px 12px;
            background: #f8fafc;
            border-radius: 6px;
            border-left: 3px solid #3b82f6;
        }
        .news-source {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #2563eb;
            font-size: 13px;
            text-decoration: none;
        }
        .news-source:hover {
            text-decoration: underline;
        }
        .news-source-icon {
            font-size: 14px;
        }
        .footer {
            text-align: center;
            color: #64748b;
            font-size: 13px;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        .validation-badge {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 28px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-size: 14px;
            color: #64748b;
        }
        .loading::after {
            content: '';
            width: 16px;
            height: 16px;
            border: 2px solid #3b82f6;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="weather-section" id="weatherSection">
            <div class="loading">正在获取真实天气数据...</div>
        </div>
        <div class="content-section">
            <h1>
                <span>AI每日简报</span>
                <span class="validation-badge">✅ 2026-05-10 验证通过</span>
            </h1>
            <div id="newsletter"></div>
            <button onclick="generateNewsletter()">刷新简报</button>
            <div class="footer">
                ⏰ 每天8:00自动推送 · 专业AI资讯
            </div>
        </div>
    </div>

    <script>
        const techProgressData = [
            {
                title: 'DeepSeek首融500亿创纪录，AI资本盛宴加速',
                summary: 'DeepSeek完成首轮融资，目标估值450-500亿美元，国家人工智能产业投资基金占40%，投后估值或突破3500亿元人民币。',
                source: '今日头条AI日报',
                url: 'https://m.toutiao.com/group/7638053873299276298/',
                date: '2026-05-10',
                validated: true
            },
            {
                title: '2026年主流AI大模型终极对比:谁才是真正的王者?',
                summary: '2026年AI大模型战场白热化，全面对比国内外主流模型，各大厂商亮出看家本领，为用户提供深度选择参考。',
                source: '今日头条',
                url: 'https://m.toutiao.com/group/7637893549078249984/',
                date: '2026-05-10',
                validated: true
            },
            {
                title: '华为AI芯片市场份额领先，2026年中国AI产业迎来转折点',
                summary: '华为Ascend 950PR处理器自3月量产以来订单激增，2026年华为AI芯片市场预计占据最大份额，产业迎来历史性转折点。',
                source: '科技日报',
                url: 'https://m.toutiao.com/group/7638257777407771188/',
                date: '2026-05-10',
                validated: true
            }
        ];

        const medicineBusinessData = [
            {
                title: '诺和诺德与OpenAI达成战略合作，AI+医药效率革命来临',
                summary: '丹麦制药巨头诺和诺德宣布与OpenAI战略合作，AI全面部署至药物研发、生产制造及商业运营全链条。',
                source: '今日头条',
                url: 'https://m.toutiao.com/group/7636621432105009710/',
                date: '2026-05-10',
                validated: true
            },
            {
                title: '2026 AI制药的"试金石之年"来了:谁在布局?',
                summary: 'AI制药赛道迎来关键历史节点，人工智能从实验室辅助工具进化为驱动药物研发流程的核心生产力。',
                source: '今日头条',
                url: 'https://m.toutiao.com/group/7637510461517070863/',
                date: '2026-05-10',
                validated: true
            },
            {
                title: '云南十部门联合发文推动AI+医疗卫生应用发展',
                summary: '云南加快医疗卫生领域AI应用发展，2026年底将建成省级卫生健康数据共享交换枢纽，构建20个业务资源数据库。',
                source: '今日头条',
                url: 'https://m.toutiao.com/group/7637731355501019667/',
                date: '2026-05-10',
                validated: true
            }
        ];

        function filterByToday(data) {
            const today = new Date().toISOString().split('T')[0];
            return data.filter(item => {
                if (!item.date) return false;
                return item.date === today;
            });
        }

        function sortByDate(data) {
            return [...data].sort((a, b) => {
                return new Date(b.date) - new Date(a.date);
            });
        }

        const weatherIcons = {
            '晴': '☀️',
            '多云': '⛅',
            '晴间多云': '🌤️',
            '阴': '🌥️',
            '小雨': '🌧️',
            '阵雨': '🌦️',
            '雷阵雨': '⛈️',
            '大雨': '🌧️',
            '雪': '❄️',
            '雾霾': '🌫️'
        };

        const weatherTips = {
            '晴': '天气晴好，适宜外出',
            '多云': '多云天气，注意防晒',
            '晴间多云': '温度适宜，适合户外活动',
            '阴': '阴天，建议携带薄外套',
            '小雨': '有小雨，记得带伞',
            '阵雨': '可能有阵雨，外出注意',
            '雷阵雨': '注意防范雷电',
            '大雨': '大雨天气，减少外出',
            '雪': '雪天路滑，注意安全',
            '雾霾': '雾霾天气，减少户外活动'
        };

        function getDateInfo() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            const weekdayOptions = { weekday: 'long' };
            return {
                date: now.toLocaleDateString('zh-CN', options),
                weekday: now.toLocaleDateString('zh-CN', weekdayOptions),
                dateKey: now.toISOString().split('T')[0]
            };
        }

        async function fetchOpenMeteoWeather() {
            try {
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=39.9042&longitude=116.4074&current=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m,weather_code&hourly=temperature_2m&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=Asia/Shanghai');

                if (!response.ok) {
                    throw new Error(`HTTP error: ${response.status}`);
                }

                const data = await response.json();

                const weatherCodes = {
                    0: '晴', 1: '晴', 2: '多云', 3: '阴',
                    45: '雾霾', 48: '雾',
                    51: '小雨', 53: '小雨', 55: '小雨',
                    61: '小雨', 63: '中雨', 65: '大雨',
                    71: '小雪', 73: '中雪', 75: '大雪',
                    80: '阵雨', 81: '阵雨', 82: '阵雨',
                    95: '雷阵雨', 96: '雷阵雨', 99: '雷阵雨'
                };

                const windDirs = ['北风', '东北风', '东风', '东南风', '南风', '西南风', '西风', '西北风'];
                const windDirIndex = Math.round(data.current.wind_direction_10m / 45) % 8;

                const tempMin = Math.round(data.daily.temperature_2m_min[0]);
                const tempMax = Math.round(data.daily.temperature_2m_max[0]);

                return {
                    location: '北京',
                    condition: weatherCodes[data.current.weather_code] || '晴',
                    temp: `${tempMin}°C - ${tempMax}°C`,
                    wind: windDirs[windDirIndex],
                    windLevel: Math.round(data.current.wind_speed_10m / 3) + '级',
                    isReal: true,
                    source: 'Open-Meteo（国际权威气象数据）'
                };
            } catch (error) {
                console.error('获取天气数据失败:', error);
                return {
                    location: '北京',
                    condition: '晴',
                    temp: '18°C - 28°C',
                    wind: '东风',
                    windLevel: '3级',
                    isReal: false,
                    source: '演示数据'
                };
            }
        }

        function generateWeatherHtml(weatherData) {
            const dateInfo = getDateInfo();
            const icon = weatherIcons[weatherData.condition] || '☀️';
            const tip = weatherTips[weatherData.condition] || '天气状况良好';

            return `
                <div class="weather-top">
                    <div>
                        <div class="weather-location">📍 ${weatherData.location}</div>
                        <div class="weather-date">${dateInfo.date}</div>
                        <div class="weather-weekday">${dateInfo.weekday}</div>
                    </div>
                    <div class="weather-icon">${icon}</div>
                </div>
                <div class="weather-main">
                    <div class="weather-temp">${weatherData.temp}</div>
                    <div class="weather-info">
                        <div class="weather-condition">${weatherData.condition}</div>
                        <div class="weather-wind">🌬️ ${weatherData.wind}${weatherData.windLevel}</div>
                        <div class="weather-tip">💡 ${tip}</div>
                    </div>
                </div>
                <div class="weather-source">
                    数据来源：${weatherData.source}
                </div>
            `;
        }

        function renderNewsItem(item) {
            const validatedBadge = item.validated ? '<span style="color: #10b981; font-size: 11px;"> ✅已验证</span>' : '';
            return `
                <div class="news-item">
                    <div class="news-date">${item.date}${validatedBadge}</div>
                    <div class="news-title">${item.title}</div>
                    <div class="news-summary">${item.summary}</div>
                    <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="news-source">
                        <span class="news-source-icon">🔗</span>
                        ${item.source}
                    </a>
                </div>
            `;
        }

        async function generateNewsletter() {
            try {
                const weatherData = await fetchOpenMeteoWeather();
                document.getElementById('weatherSection').innerHTML = generateWeatherHtml(weatherData);
            } catch (error) {
                console.error('天气数据加载失败:', error);
            }

            const techNews = sortByDate(filterByToday(techProgressData));
            const medNews = sortByDate(filterByToday(medicineBusinessData));

            let html = `
                <div class="section-block">
                    <div class="section-header">
                        <img src="images/tech-icon.svg" alt="AI技术" class="section-icon" style="max-width: 24px; max-height: 24px; vertical-align: middle;">
                        <span class="section-title">AI 大语言模型进展</span>
                        <span class="section-count">今日 ${techNews.length} 条</span>
                    </div>
                    ${techNews.map(renderNewsItem).join('')}
                </div>

                <div class="section-block">
                    <div class="section-header">
                        <span class="section-icon">💊</span>
                        <span class="section-title">医药行业的商业落地</span>
                        <span class="section-count">今日 ${medNews.length} 条</span>
                    </div>
                    ${medNews.map(renderNewsItem).join('')}
                </div>
            `;

            document.getElementById('newsletter').innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', generateNewsletter);
    </script>
</body>
</html>
